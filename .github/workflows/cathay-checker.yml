name: Cathay Pacific Award Checker

on:
  schedule:
    # Run every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:   # also allow manual trigger

permissions:
  contents: write      # needed to commit updated availability cache

jobs:
  check-awards:
    # Runs on your own machine (self-hosted runner) so the home IP
    # is used — airline websites do not block residential IPs.
    runs-on: self-hosted
    timeout-minutes: 90

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        shell: bash   # use Git Bash on Windows so Unix commands work

    steps:
      - uses: actions/checkout@v4

      - name: Install / upgrade Python dependencies
        run: pip install -r requirements.txt

      - name: Ensure Playwright Chromium is installed
        run: playwright install chromium

      - name: Run award availability check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python cathay_checker.py

      - name: Commit updated availability cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cathay_availability.json || true
          if git diff --cached --quiet; then
            echo "Cache unchanged — nothing to commit"
          else
            git commit -m "chore: update Cathay award availability cache — $(date -u +'%d %b %Y %H:%M UTC')"
            git push
          fi

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-${{ github.run_number }}
          path: debug_screenshots/
          if-no-files-found: ignore
          retention-days: 7
