name: Update ASX200 Report

on:
  schedule:
    # 4:30 PM AEST (06:30 UTC) — after ASX market close, weekdays
    - cron: '30 6 * * 1-5'
  workflow_dispatch:  # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate static report
        run: python generate_static.py

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update ASX200 report — $(date -u +'%d %b %Y %H:%M UTC')"
            git push
          fi
